# Do not use this file in production. This file is intended for local development only. 
services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb_db
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: test_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
  db:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: test_db
    ports:
      - "8432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  databasus:
    container_name: databasus
    image: databasus/databasus:latest
    ports:
      - "4005:4005"
    env_file:
      # defines the default admin password to set
      - databasus_test.env
    volumes:
      - ./databasus-data:/databasus-data
      - ./wrapper_set_admin_pwd.sh:/wrapper_set_admin_pwd.sh:ro
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/wrapper_set_admin_pwd.sh"]
volumes:
  postgres_data:
    driver: local
  mariadb_data:
    driver: local